name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        type: choice
        default: both
        options:
          - both
          - "@potionify/gameplay-tags"
          - gameplay-tags
      dist-tag:
        description: npm dist-tag
        required: true
        type: choice
        default: alpha
        options:
          - alpha
          - beta
          - latest
      dry-run:
        description: Run npm publish without publishing
        required: true
        type: boolean
        default: true
      confirm-latest:
        description: Required when dist-tag is latest
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ inputs['dist-tag'] != 'latest' || inputs['confirm-latest'] == true }}
    runs-on: ubuntu-latest
    environment: npm
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPMJS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Publish selected package
        shell: bash
        run: |
          set -euo pipefail

          workspace_dir() {
            case "$1" in
              "@potionify/gameplay-tags") echo "packages/gameplay-tags" ;;
              gameplay-tags) echo "packages/redirect" ;;
              *) echo "Unsupported workspace: $1" >&2; return 1 ;;
            esac
          }

          publish_workspace() {
            local workspace="$1"
            local package_dir
            local package_name
            local package_version
            local dry_run_flag=()
            local provenance_flag=()

            package_dir="$(workspace_dir "$workspace")"
            package_name="$(node -p "JSON.parse(require('node:fs').readFileSync('${package_dir}/package.json', 'utf8')).name")"
            package_version="$(node -p "JSON.parse(require('node:fs').readFileSync('${package_dir}/package.json', 'utf8')).version")"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published; skipping."
              return
            fi

            if [[ "${{ inputs['dry-run'] }}" == "true" ]]; then
              dry_run_flag=(--dry-run)
            else
              provenance_flag=(--provenance)
            fi

            npm publish \
              --workspace "$workspace" \
              --tag "${{ inputs['dist-tag'] }}" \
              "${provenance_flag[@]}" \
              "${dry_run_flag[@]}"
          }

          deprecate_unscoped_package() {
            if [[ "${{ inputs['dry-run'] }}" == "true" ]]; then
              echo "Skipping gameplay-tags deprecation during dry run."
              return
            fi

            npm deprecate gameplay-tags@"*" "Use the official package: @potionify/gameplay-tags"
          }

          case "${{ inputs.package }}" in
            both)
              publish_workspace "@potionify/gameplay-tags"
              publish_workspace "gameplay-tags"
              deprecate_unscoped_package
              ;;
            "@potionify/gameplay-tags")
              publish_workspace "@potionify/gameplay-tags"
              ;;
            gameplay-tags)
              publish_workspace "gameplay-tags"
              deprecate_unscoped_package
              ;;
          esac

  latest-not-confirmed:
    if: ${{ inputs['dist-tag'] == 'latest' && inputs['confirm-latest'] != true }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Publishing with dist-tag latest requires confirm-latest=true."
          exit 1
